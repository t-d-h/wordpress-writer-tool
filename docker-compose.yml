services:
  # mongodb:
  #   image: mongo:7
  #   container_name: wp-writer-mongodb
  #   volumes:
  #     - mongodb_data:/data/db
  #   networks:
  #     - wp-writer-net

  # redis:
  #   image: redis:7-alpine
  #   container_name: wp-writer-redis
  #   networks:
  #     - wp-writer-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wp-writer-backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wp-writer-worker
    command: python -m app.workers.redis_worker
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wp-writer-frontend
    ports:
      - "5174:5173"
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
