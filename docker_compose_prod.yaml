services:
  backend:
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    image: h1.dev.virt/wp-management-tool-backend:latest
    container_name: wp-writer-backend
    # network_mode: "host"
    # ports:
    #   - "8001:8000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      # - ./backend/app:/app/app
      - ./wp_management_tool_images:/tmp/wp_images

  worker:
    # build:
    #   context: ./worker
    #   dockerfile: Dockerfile
    image: h1.dev.virt/wp-management-tool-worker:latest
    env_file:
      - .env
    environment:
      - TZ=Asia/Ho_Chi_Minh
    # network_mode: "host"
    command: python -m app.main
    deploy:
      replicas: 3
    volumes:
      # - ./worker/app:/app/app
      - ./wp_management_tool_images:/tmp/wp_images

  frontend:
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    image: h1.dev.virt/wp-management-tool-frontend:latest
    container_name: wp-writer-frontend
    # network_mode: "host"
    ports:
      - "5174:5173"
    env_file:
      - .env
    environment:
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - backend
    # volumes:
    #   - ./frontend/src:/app/src
    #   - ./frontend/index.html:/app/index.html

